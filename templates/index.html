<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Student Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #03040a;
  --shell: #0d1220;
  --panel: rgba(13,18,32,0.85);
  --rim: rgba(255,255,255,0.07);
  --rim2: rgba(255,255,255,0.12);
  --cyan: #00d4ff;
  --cyan2: #00a8cc;
  --gold: #f5c842;
  --gold2: #e8a800;
  --gold-dim: rgba(245,200,66,0.1);
  --gold-glow: rgba(245,200,66,0.2);
  --amber: #ff9500;
  --red: #ff4560;
  --text: #e2e8f8;
  --text2: #7a8aaa;
  --text3: #3d4d6a;
  --text4: #252f42;
  --ff-display: 'Outfit', sans-serif;
  --ff-mono: 'JetBrains Mono', monospace;
  --r-sm: 8px;
}

/*RESET*/
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--ff-display);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/*BACKGROUND*/
.bg-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 0%, transparent 70%);
}
.bg-orb { position: absolute; border-radius: 50%; filter: blur(100px); }
.orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%); top: -150px; left: -100px; animation: drift1 18s ease-in-out infinite; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(245,200,66,0.04) 0%, transparent 70%); bottom: -100px; right: -100px; animation: drift2 22s ease-in-out infinite; }
@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px,30px); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px,-40px); } }
.bg-scanlines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
  opacity: 0.4;
}

/*NAV*/
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 18px 60px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(3,4,10,0.7);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--rim);
}
.nav-logo {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--ff-display); font-weight: 800; font-size: 20px;
  letter-spacing: 4px; text-transform: uppercase; color: var(--text);
  text-decoration: none;
}
.logo-hex { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
.nav-tagline { font-family: var(--ff-mono); font-size: 10px; color: var(--text3); letter-spacing: 2px; margin-top: 2px; }

/*PAGE WRAPPER*/
.page-wrap { display: none; min-height: 100vh; position: relative; z-index: 1; animation: fadeUp 0.5s ease both; }
.page-wrap.active { display: block; }

/*SHARED*/
.card {
  background: var(--panel);
  backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--rim);
  border-radius: 28px;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,212,255,0.03) 0%, transparent 50%, rgba(245,200,66,0.015) 100%);
  pointer-events: none;
}
.card-glow-top::after {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.5;
}
.section-label {
  font-family: var(--ff-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase; color: var(--cyan);
  display: flex; align-items: center; gap: 10px;
}
.section-label::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--cyan); }

/*BUTTON*/
.btn-gold {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 36px; border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: var(--void); font-family: var(--ff-display); font-size: 15px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  border: none; cursor: pointer; transition: all 0.25s;
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--gold-glow); }

/*ANIMATIONS*/
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.anim-1 { animation: fadeUp 0.7s ease both; }
.anim-3 { animation: fadeUp 0.7s 0.24s ease both; }

/*FORM*/
.form-page {
  min-height: 100vh; padding: 120px 60px 80px;
  display: flex; flex-direction: column; align-items: center;
}
.form-page-header { text-align: center; margin-bottom: 52px; }
.form-page-title { font-family: var(--ff-display); font-size: 48px; font-weight: 800; letter-spacing: -2px; margin: 14px 0 16px; }
.form-page-desc { font-size: 15px; color: var(--text2); font-weight: 300; max-width: 500px; }

/* Progress Steps */
.progress-steps { display: flex; align-items: center; margin-bottom: 52px; }
.step { display: flex; align-items: center; gap: 10px; font-family: var(--ff-mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
.step-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); font-size: 12px; font-weight: 600; border: 1px solid; transition: all 0.3s; }
.step.done .step-num { background: var(--cyan); border-color: var(--cyan); color: var(--void); }
.step.active .step-num { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.step.inactive .step-num { background: transparent; border-color: var(--text4); color: var(--text3); }
.step.done .step-label { color: var(--cyan); }
.step.active .step-label { color: var(--gold); }
.step.inactive .step-label { color: var(--text3); }
.step-line { width: 60px; height: 1px; background: var(--rim2); margin: 0 4px; }
.step-line.done-line { background: var(--cyan); }

/* Form Card */
.form-card-wrap { width: 100%; max-width: 860px; }
.form-card { padding: 48px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 32px; }
.form-section-head { grid-column: 1 / -1; padding-bottom: 16px; border-bottom: 1px solid var(--rim); margin-bottom: 4px; }
.form-section-head h3 { font-family: var(--ff-display); font-size: 16px; font-weight: 700; margin-top: 8px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-label { font-family: var(--ff-mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); display: flex; align-items: center; justify-content: space-between; }
.form-label-hint { color: var(--text3); font-weight: 400; }
.form-input, .form-select {
  width: 100%; padding: 14px 18px;
  background: rgba(6,9,15,0.8); border: 1px solid var(--rim2);
  border-radius: var(--r-sm); color: var(--text);
  font-family: var(--ff-display); font-size: 15px;
  outline: none; transition: all 0.25s; -webkit-appearance: none;
}
.form-input::placeholder { color: var(--text4); }
.form-input:focus, .form-select:focus { border-color: var(--cyan); background: rgba(0,212,255,0.03); box-shadow: 0 0 0 3px rgba(0,212,255,0.08); }
.form-select { cursor: pointer; }
.form-select option { background: var(--shell); }

/* Sliders */
.slider-wrap { position: relative; }
.slider-track { position: relative; height: 6px; background: var(--rim2); border-radius: 3px; margin-top: 4px; }
.slider-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--cyan2), var(--cyan)); transition: width 0.1s; pointer-events: none; }
.form-range { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; margin: 0; -webkit-appearance: none; }
.slider-val-display { font-family: var(--ff-mono); font-size: 14px; font-weight: 600; color: var(--cyan); }
.marks-visual { display: flex; gap: 4px; margin-top: 8px; }
.mark-block { flex: 1; height: 4px; border-radius: 2px; background: var(--rim); transition: background 0.2s; }
.mark-block.filled-low { background: var(--red); }
.mark-block.filled-mid { background: var(--amber); }
.mark-block.filled-high { background: var(--cyan); }

/* Form Footer */
.form-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--rim); }

</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-scanlines"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="/">
    <div class="logo-hex">
      <svg viewBox="0 0 40 40" fill="none" width="34" height="34">
        <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" stroke="rgba(0,212,255,0.6)" stroke-width="1.5" fill="rgba(0,212,255,0.06)"/>
        <polygon points="20,9 30,15 30,25 20,31 10,25 10,15" stroke="rgba(0,212,255,0.3)" stroke-width="1" fill="none"/>
        <circle cx="20" cy="20" r="3" fill="#00d4ff"/>
      </svg>
    </div>
    <div>
      <div>NEXUS</div>
      <div class="nav-tagline">AI Performance Engine</div>
    </div>
  </a>
</nav>

<div id="pg-form" class="page-wrap active">
  <div class="form-page">

    <div class="form-page-header anim-1">
      <div class="section-label" style="justify-content:center">Prediction Engine</div>
      <h1 class="form-page-title">Analyse a Student</h1>
      <p class="form-page-desc">Enter academic metrics below. NEXUS will compute a performance prediction using six weighted factors.</p>
    </div>

    <div class="form-card-wrap anim-3">
      <div class="form-card card card-glow-top">
        <div class="form-grid">

          <!-- Student Info -->
          <div class="form-section-head">
            <div class="section-label">01</div>
            <h3>Student Information</h3>
          </div>
          <div class="form-group">
            <label class="form-label">Student Name <span class="form-label-hint">Required</span></label>
            <input class="form-input" type="text" id="f_name" placeholder="e.g. Arjun Sharma">
          </div>
          <div class="form-group">
            <label class="form-label">Department</label>
            <select class="form-select" id="f_dept">
              <option value="">Select department</option>
              <option>Computer Science</option>
              <option>Electronics & Comm.</option>
              <option>Mechanical Engineering</option>
              <option>Information Technology</option>
              <option>Civil Engineering</option>
              <option>Electrical Engineering</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Year of Study</label>
            <select class="form-select" id="f_year">
              <option value="">Select year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Roll Number</label>
            <input class="form-input" type="text" id="f_roll" placeholder="e.g. CS2023047">
          </div>

          <!-- Academic Metrics -->
          <div class="form-section-head">
            <div class="section-label">02</div>
            <h3>Academic Performance Metrics</h3>
          </div>

          <!-- Attendance Slider -->
          <div class="form-group">
            <label class="form-label">
              Attendance
              <span class="slider-val-display" id="v_attendance">75%</span>
            </label>
            <div class="slider-wrap">
              <div class="slider-track">
                <div class="slider-fill" id="fill_attendance" style="width:75%"></div>
                <input class="form-range" type="range" id="attendance" min="0" max="100" value="75"
                  oninput="updateSlider('attendance','%',0,100)">
              </div>
            </div>
            <div class="marks-visual" id="marks_attendance"></div>
          </div>

          <!-- Study Hours Slider -->
          <div class="form-group">
            <label class="form-label">
              Study Hours / Week
              <span class="slider-val-display" id="v_studyhours">18h</span>
            </label>
            <div class="slider-wrap">
              <div class="slider-track">
                <div class="slider-fill" id="fill_studyhours" style="width:30%"></div>
                <input class="form-range" type="range" id="studyhours" min="0" max="60" value="18"
                  oninput="updateSlider('studyhours','h',0,60)">
              </div>
            </div>
            <div class="marks-visual" id="marks_studyhours"></div>
          </div>

          <!-- Internal Marks -->
          <div class="form-group">
            <label class="form-label">Internal Marks <span class="form-label-hint">out of 50</span></label>
            <input class="form-input" type="number" id="f_internal" min="0" max="50" placeholder="e.g. 38">
          </div>

          <!-- Assignment Score -->
          <div class="form-group">
            <label class="form-label">Assignment Score <span class="form-label-hint">out of 100</span></label>
            <input class="form-input" type="number" id="f_assign" min="0" max="100" placeholder="e.g. 82">
          </div>

          <!-- Mid-term -->
          <div class="form-group">
            <label class="form-label">Mid-term Score <span class="form-label-hint">out of 100</span></label>
            <input class="form-input" type="number" id="f_mid" min="0" max="100" placeholder="e.g. 74">
          </div>

          <!-- Extracurricular -->
          <div class="form-group">
            <label class="form-label">Extracurricular Index <span class="form-label-hint">0–10</span></label>
            <input class="form-input" type="number" id="f_extra" min="0" max="10" placeholder="e.g. 6">
          </div>

        </div><!-- /form-grid -->

        <div class="form-footer">
          <button class="btn-gold" id="predictBtn" onclick="runPrediction()">
            Generate Prediction →
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
<script>

/* ── SLIDER UPDATE ── */
function updateSlider(id, unit, min, max) {
  const el = document.getElementById(id);
  const val = parseInt(el.value);
  document.getElementById('v_' + id).textContent = val + unit;
  const pct = ((val - min) / (max - min)) * 100;
  document.getElementById('fill_' + id).style.width = pct + '%';
  renderMarkBlocks(id, pct);
}
function renderMarkBlocks(id, pct) {
  const container = document.getElementById('marks_' + id);
  if (!container) return;
  let html = '';
  for (let i = 0; i < 10; i++) {
    const threshold = (i / 10) * 100;
    let cls = 'mark-block';
    if (threshold < pct) cls += pct < 40 ? ' filled-low' : pct < 70 ? ' filled-mid' : ' filled-high';
    html += `<div class="${cls}"></div>`;
  }
  container.innerHTML = html;
}
// Init sliders on load
updateSlider('attendance', '%', 0, 100);
updateSlider('studyhours', 'h', 0, 60);

</script>
</body>
</html>
